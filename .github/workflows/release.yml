name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build iOS App
        run: |
          xcodebuild -project WavefrontApp.xcodeproj \
            -scheme WavefrontApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/Wavefront.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create unsigned IPA
        run: |
          mkdir -p build/Payload
          cp -r build/Wavefront.xcarchive/Products/Applications/WavefrontApp.app build/Payload/
          cd build && zip -r Wavefront-${{ github.ref_name }}-unsigned.ipa Payload
          
      - name: Upload iOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-app
          path: build/Wavefront-${{ github.ref_name }}-unsigned.ipa

  release:
    name: Create Release
    runs-on: macos-latest
    needs: build-ios
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download iOS artifact
        uses: actions/download-artifact@v8
        with:
          name: ios-app
          path: artifacts

      - name: Run Tests
        run: swift test

      - name: Generate Changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            echo "changelog=Initial release" >> $GITHUB_OUTPUT
          else
            CHANGELOG=$(git log --pretty=format:"- %s" $PREV_TAG..HEAD)
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGELOG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.changelog }}
            
            ## Downloads
            - **Wavefront-${{ github.ref_name }}-unsigned.ipa** - iOS app (requires signing)
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
