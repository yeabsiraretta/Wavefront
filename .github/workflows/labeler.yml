name: PR Labeler

on:
  pull_request:
    types: [opened, edited]

jobs:
  label:
    name: Add Labels
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Add labels based on branch and title
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const branch = pr.head.ref;
            const title = pr.title.toLowerCase();
            const labels = [];
            
            // Label based on branch prefix
            if (branch.startsWith('feature/')) {
              labels.push('enhancement');
            } else if (branch.startsWith('bugfix/') || branch.startsWith('fix/')) {
              labels.push('bug');
            } else if (branch.startsWith('hotfix/')) {
              labels.push('bug');
            } else if (branch.startsWith('docs/')) {
              labels.push('documentation');
            } else if (branch.startsWith('chore/')) {
              labels.push('enhancement');
            }
            
            // Label based on title prefix
            if (title.startsWith('feat')) {
              if (!labels.includes('enhancement')) labels.push('enhancement');
            } else if (title.startsWith('fix')) {
              if (!labels.includes('bug')) labels.push('bug');
            } else if (title.startsWith('docs')) {
              if (!labels.includes('documentation')) labels.push('documentation');
            }
            
            // Add labels if any were detected
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: labels
              });
              console.log(`Added labels: ${labels.join(', ')}`);
            } else {
              console.log('No labels to add based on branch/title');
            }
