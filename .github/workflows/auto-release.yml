name: Auto Release

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest tag
        id: latest_tag
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST"

      - name: Calculate next version
        id: next_version
        run: |
          LATEST="${{ steps.latest_tag.outputs.tag }}"
          # Remove 'v' prefix
          VERSION="${LATEST#v}"
          
          # Parse version components
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          
          # Determine version bump based on PR title/commits
          PR_TITLE="${{ github.event.pull_request.title }}"
          
          if [[ "$PR_TITLE" =~ ^feat ]]; then
            # Feature = minor bump
            MINOR=$((MINOR + 1))
            PATCH=0
          elif [[ "$PR_TITLE" =~ ^fix ]] || [[ "$PR_TITLE" =~ ^bugfix ]]; then
            # Fix = patch bump
            PATCH=$((PATCH + 1))
          else
            # Default = patch bump
            PATCH=$((PATCH + 1))
          fi
          
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Next version: $NEW_VERSION"

      - name: Create and push tag
        run: |
          NEW_VERSION="${{ steps.next_version.outputs.version }}"
          git tag -a "$NEW_VERSION" -m "Release $NEW_VERSION"
          git push origin "$NEW_VERSION"

      - name: Generate release notes
        id: notes
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY="${{ github.event.pull_request.body }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          BRANCH="${{ github.event.pull_request.head.ref }}"
          
          # Determine type from PR title prefix
          TYPE="chore"
          if [[ "$PR_TITLE" =~ ^feat ]]; then TYPE="feat"; fi
          if [[ "$PR_TITLE" =~ ^fix ]]; then TYPE="fix"; fi
          if [[ "$PR_TITLE" =~ ^docs ]]; then TYPE="docs"; fi
          if [[ "$PR_TITLE" =~ ^refactor ]]; then TYPE="refactor"; fi
          if [[ "$PR_TITLE" =~ ^test ]]; then TYPE="test"; fi
          if [[ "$PR_TITLE" =~ ^ci ]]; then TYPE="ci"; fi
          
          cat > /tmp/notes.md << 'NOTES_EOF'
          ## Description
          
          $PR_TITLE
          
          ## Type of Change
          
          - **Type**: `$TYPE`
          - **Branch**: `$BRANCH`
          
          ## Pull Request
          
          - **PR**: #$PR_NUMBER
          - **Author**: @$PR_AUTHOR
          - **URL**: $PR_URL
          
          ## Full Changelog
          
          $PR_BODY
          NOTES_EOF
          
          # Substitute variables
          sed -i "s|\$PR_TITLE|$PR_TITLE|g" /tmp/notes.md
          sed -i "s|\$TYPE|$TYPE|g" /tmp/notes.md
          sed -i "s|\$BRANCH|$BRANCH|g" /tmp/notes.md
          sed -i "s|\$PR_NUMBER|$PR_NUMBER|g" /tmp/notes.md
          sed -i "s|\$PR_AUTHOR|$PR_AUTHOR|g" /tmp/notes.md
          sed -i "s|\$PR_URL|$PR_URL|g" /tmp/notes.md
          sed -i "s|\$PR_BODY|$PR_BODY|g" /tmp/notes.md
          
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next_version.outputs.version }}
          name: Release ${{ steps.next_version.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
